name: Guide Update

on:
  schedule:
    # 每天 0:40, 8:40, 16:40 运行（UTC时间）
    # 北京时间 = UTC+8，对应 8:40, 16:40, 0:40（次日）
    - cron: '40 0,8,16 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update-guide:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pypinyin cloudscraper
    
    - name: Run Guide merger
      run: |
        python guide_merger.py
    
    - name: Check for changes
      id: check_changes
      run: |
        if [[ -n "$(git status --porcelain)" ]]; then
          echo "changes=true" >> $GITHUB_OUTPUT
          echo "✅ 检测到文件变更"
          git status --short
        else
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "ℹ️ 没有文件变更"
        fi
    
    - name: Commit and push changes
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email '65702849+github-actions[bot]@users.noreply.github.com'
        git add guide.xml guide.xml.gz
        git commit -m "Auto update Guide data - $(date '+%Y-%m-%d %H:%M:%S')"
        git push origin HEAD:${GITHUB_REF#refs/heads/}